###############################################################
#  Nextcloud Enterprise — All-in-One docker-compose.yml
#  + Windows Active Directory (LDAP) Integration
#  Domain: cltpmo.ir
#  Mode: AD users + Local users (hybrid)
###############################################################

name: nextcloud-enterprise

networks:
  frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.20.0/24
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
  db_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/24

volumes:
  grafana_data:
  nextcloud_html:
  nextcloud_data:
  pg_primary_data:
  pg_replica1_data:
  pg_replica2_data:
  pg_wal_archive:
  redis_master_data:
  redis_replica1_data:
  redis_replica2_data:

services:

# ══════════════════════════════════════════════════════════════
#  LAYER 0 — Reverse Proxy
# ══════════════════════════════════════════════════════════════
  nginx:
    image: nginx:1.27-alpine
    container_name: nc_nginx
    command: /bin/sh -c "rm -f /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf/nginx/nextcloud.conf:/etc/nginx/conf.d/nextcloud.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nextcloud_html:/var/www/html:ro
    networks:
      - frontend
    depends_on:
      app1: { condition: service_healthy }
      app2: { condition: service_healthy }
      app3: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    ulimits:
      nofile: { soft: 65536, hard: 65536 }

# ══════════════════════════════════════════════════════════════
#  LAYER 1 — Application Nodes (3x PHP-FPM)
# ══════════════════════════════════════════════════════════════
  app1:
    image: nextcloud:30-fpm-alpine
    container_name: nc_app1
    restart: unless-stopped
    volumes:
      - nextcloud_html:/var/www/html
      - nextcloud_data:/var/www/html/data
      - ./conf/php/php.ini:/usr/local/etc/php/conf.d/zzz-nc.ini:ro
      - ./conf/php/php-fpm.conf:/usr/local/etc/php-fpm.d/zz-nc.conf:ro
    environment:
      - POSTGRES_HOST=pgbouncer
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-nextcloud}
      - POSTGRES_USER=${POSTGRES_USER:-nextcloud}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set in .env}
      - REDIS_HOST=redis_master
      - REDIS_HOST_PORT=6379
      - REDIS_HOST_PASSWORD=${REDIS_PASSWORD:?set in .env}
      - NEXTCLOUD_ADMIN_USER=${NC_ADMIN_USER:-admin}
      - NEXTCLOUD_ADMIN_PASSWORD=${NC_ADMIN_PASSWORD:?set in .env}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NC_DOMAIN:-cloud.cltpmo.ir} localhost nginx
      - PHP_MEMORY_LIMIT=1G
      - PHP_UPLOAD_LIMIT=16G
      - LDAP_HOST=${LDAP_HOST:?set in .env}
      - LDAP_PORT=${LDAP_PORT:-389}
      - LDAP_BIND_DN=${LDAP_BIND_DN:?set in .env}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD:?set in .env}
      - LDAP_BASE_DN=${LDAP_BASE_DN:?set in .env}
      - LDAP_DOMAIN=${LDAP_DOMAIN:-cltpmo.ir}
    networks:
      - frontend
      - backend
    depends_on:
      pgbouncer:    { condition: service_started }
      redis_master: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>&1 | grep -q 'successful'"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 180s

  app2:
    image: nextcloud:30-fpm-alpine
    container_name: nc_app2
    restart: unless-stopped
    volumes:
      - nextcloud_html:/var/www/html
      - nextcloud_data:/var/www/html/data
      - ./conf/php/php.ini:/usr/local/etc/php/conf.d/zzz-nc.ini:ro
      - ./conf/php/php-fpm.conf:/usr/local/etc/php-fpm.d/zz-nc.conf:ro
    environment:
      - POSTGRES_HOST=pgbouncer
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-nextcloud}
      - POSTGRES_USER=${POSTGRES_USER:-nextcloud}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set in .env}
      - REDIS_HOST=redis_master
      - REDIS_HOST_PORT=6379
      - REDIS_HOST_PASSWORD=${REDIS_PASSWORD:?set in .env}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NC_DOMAIN:-cloud.cltpmo.ir} localhost nginx
      - PHP_MEMORY_LIMIT=1G
      - PHP_UPLOAD_LIMIT=16G
      - LDAP_HOST=${LDAP_HOST:?set in .env}
      - LDAP_PORT=${LDAP_PORT:-389}
      - LDAP_BIND_DN=${LDAP_BIND_DN:?set in .env}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD:?set in .env}
      - LDAP_BASE_DN=${LDAP_BASE_DN:?set in .env}
      - LDAP_DOMAIN=${LDAP_DOMAIN:-cltpmo.ir}
    networks:
      - frontend
      - backend
    depends_on:
      app1:         { condition: service_healthy }
      pgbouncer:    { condition: service_started }
      redis_master: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>&1 | grep -q 'successful'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  app3:
    image: nextcloud:30-fpm-alpine
    container_name: nc_app3
    restart: unless-stopped
    volumes:
      - nextcloud_html:/var/www/html
      - nextcloud_data:/var/www/html/data
      - ./conf/php/php.ini:/usr/local/etc/php/conf.d/zzz-nc.ini:ro
      - ./conf/php/php-fpm.conf:/usr/local/etc/php-fpm.d/zz-nc.conf:ro
    environment:
      - POSTGRES_HOST=pgbouncer
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-nextcloud}
      - POSTGRES_USER=${POSTGRES_USER:-nextcloud}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set in .env}
      - REDIS_HOST=redis_master
      - REDIS_HOST_PORT=6379
      - REDIS_HOST_PASSWORD=${REDIS_PASSWORD:?set in .env}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NC_DOMAIN:-cloud.cltpmo.ir} localhost nginx
      - PHP_MEMORY_LIMIT=1G
      - PHP_UPLOAD_LIMIT=16G
      - LDAP_HOST=${LDAP_HOST:?set in .env}
      - LDAP_PORT=${LDAP_PORT:-389}
      - LDAP_BIND_DN=${LDAP_BIND_DN:?set in .env}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD:?set in .env}
      - LDAP_BASE_DN=${LDAP_BASE_DN:?set in .env}
      - LDAP_DOMAIN=${LDAP_DOMAIN:-cltpmo.ir}
    networks:
      - frontend
      - backend
    depends_on:
      app1:         { condition: service_healthy }
      pgbouncer:    { condition: service_started }
      redis_master: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>&1 | grep -q 'successful'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ══════════════════════════════════════════════════════════════
#  LAYER 1b — Background Worker (Cron)
# ══════════════════════════════════════════════════════════════
  cron:
    image: nextcloud:30-fpm-alpine
    container_name: nc_cron
    restart: unless-stopped
    entrypoint: /cron.sh
    volumes:
      - nextcloud_html:/var/www/html
      - nextcloud_data:/var/www/html/data
    environment:
      - POSTGRES_HOST=pgbouncer
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-nextcloud}
      - POSTGRES_USER=${POSTGRES_USER:-nextcloud}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set in .env}
      - REDIS_HOST=redis_master
      - REDIS_HOST_PORT=6379
      - REDIS_HOST_PASSWORD=${REDIS_PASSWORD:?set in .env}
      - LDAP_HOST=${LDAP_HOST:?set in .env}
      - LDAP_BIND_DN=${LDAP_BIND_DN:?set in .env}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD:?set in .env}
      - LDAP_BASE_DN=${LDAP_BASE_DN:?set in .env}
    networks:
      - backend
    depends_on:
      app1: { condition: service_healthy }

# ══════════════════════════════════════════════════════════════
#  LAYER 2a — Redis HA (Master + 2 Replica + 3 Sentinel)
# ══════════════════════════════════════════════════════════════
  redis_master:
    image: redis:7.4-alpine
    container_name: nc_redis_master
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?set in .env}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 3gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis_master_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis_replica1:
    image: redis:7.4-alpine
    container_name: nc_redis_replica1
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?set in .env}
      --replicaof redis_master 6379
      --masterauth ${REDIS_PASSWORD:?set in .env}
      --appendonly yes
      --maxmemory 3gb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_replica1_data:/data
    networks:
      - backend
    depends_on:
      redis_master: { condition: service_healthy }

  redis_replica2:
    image: redis:7.4-alpine
    container_name: nc_redis_replica2
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?set in .env}
      --replicaof redis_master 6379
      --masterauth ${REDIS_PASSWORD:?set in .env}
      --appendonly yes
      --maxmemory 3gb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_replica2_data:/data
    networks:
      - backend
    depends_on:
      redis_master: { condition: service_healthy }

  redis_sentinel1:
    image: redis:7.4-alpine
    container_name: nc_sentinel1
    restart: unless-stopped
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - /data/docker/sentinel/sentinel1:/etc/redis
    networks:
      - backend
    depends_on:
      redis_master:   { condition: service_healthy }
      redis_replica1: { condition: service_started }
      redis_replica2: { condition: service_started }

  redis_sentinel2:
    image: redis:7.4-alpine
    container_name: nc_sentinel2
    restart: unless-stopped
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - /data/docker/sentinel/sentinel2:/etc/redis
    networks:
      - backend
    depends_on:
      redis_master: { condition: service_healthy }

  redis_sentinel3:
    image: redis:7.4-alpine
    container_name: nc_sentinel3
    restart: unless-stopped
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - /data/docker/sentinel/sentinel3:/etc/redis
    networks:
      - backend
    depends_on:
      redis_master: { condition: service_healthy }

# ══════════════════════════════════════════════════════════════
#  LAYER 2b — PostgreSQL HA
# ══════════════════════════════════════════════════════════════
  pg_primary:
    image: postgres:16-alpine
    container_name: nc_pg_primary
    restart: unless-stopped
    volumes:
      - pg_primary_data:/var/lib/postgresql/data
      - pg_wal_archive:/var/lib/postgresql/wal-archive
      - ./conf/postgres/primary.conf:/etc/postgresql/postgresql.conf:ro
      - ./conf/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./conf/postgres/init:/docker-entrypoint-initdb.d:ro
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-nextcloud}
      - POSTGRES_USER=${POSTGRES_USER:-nextcloud}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set in .env}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=C --lc-ctype=C
      - REPLICATION_USER=replicator
      - REPLICATION_PASSWORD=${REPLICATION_PASSWORD:?set in .env}
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c hba_file=/etc/postgresql/pg_hba.conf
    networks:
      - backend
      - db_net
    shm_size: '512mb'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nextcloud} -d ${POSTGRES_DB:-nextcloud}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pg_replica1:
    image: postgres:16-alpine
    container_name: nc_pg_replica1
    user: "999:999"
    restart: unless-stopped
    volumes:
      - pg_replica1_data:/var/lib/postgresql/data
      - ./conf/postgres/replica.conf:/etc/postgresql/postgresql.conf:ro
    environment:
      - PGUSER=replicator
      - PGPASSWORD=${REPLICATION_PASSWORD:?set in .env}
      - PGHOST=pg_primary
    command: >
      bash -c "
        if [ ! -s /var/lib/postgresql/data/PG_VERSION ]; then
          until pg_isready -h pg_primary -U replicator; do sleep 2; done &&
          pg_basebackup -h pg_primary -U replicator -D /var/lib/postgresql/data -Fp -Xs -P -R --checkpoint=fast
        fi &&
        postgres -c config_file=/etc/postgresql/postgresql.conf
      "
    networks:
      - backend
      - db_net
    depends_on:
      pg_primary: { condition: service_healthy }
    shm_size: '256mb'

  pg_replica2:
    image: postgres:16-alpine
    container_name: nc_pg_replica2
    user: "999:999"
    restart: unless-stopped
    volumes:
      - pg_replica2_data:/var/lib/postgresql/data
      - ./conf/postgres/replica.conf:/etc/postgresql/postgresql.conf:ro
    environment:
      - PGUSER=replicator
      - PGPASSWORD=${REPLICATION_PASSWORD:?set in .env}
      - PGHOST=pg_primary
    command: >
      bash -c "
        if [ ! -s /var/lib/postgresql/data/PG_VERSION ]; then
          until pg_isready -h pg_primary -U replicator; do sleep 2; done &&
          pg_basebackup -h pg_primary -U replicator -D /var/lib/postgresql/data -Fp -Xs -P -R --checkpoint=fast
        fi &&
        postgres -c config_file=/etc/postgresql/postgresql.conf
      "
    networks:
      - backend
      - db_net
    depends_on:
      pg_primary:  { condition: service_healthy }
      pg_replica1: { condition: service_started }
    shm_size: '256mb'

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: nc_pgbouncer
    restart: unless-stopped
    volumes:
      - ./conf/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./conf/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    environment:
      - DB_HOST=pg_primary
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-nextcloud}
      - DB_USER=${POSTGRES_USER:-nextcloud}
      - DB_PASSWORD=${POSTGRES_PASSWORD:?set in .env}
      - POOL_MODE=session
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=50
    networks:
      - backend
      - db_net
    depends_on:
      pg_primary: { condition: service_healthy }

# ══════════════════════════════════════════════════════════════
#  LAYER 3 — Monitoring
# ══════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: nc_prometheus
    restart: unless-stopped
    user: "65534:65534"
    volumes:
      - ./conf/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: nc_grafana
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - backend
    depends_on:
      - prometheus

  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: nc_redis_exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis_master:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - backend

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: nc_pg_exporter
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-nextcloud}:${POSTGRES_PASSWORD}@pg_primary:5432/${POSTGRES_DB:-nextcloud}?sslmode=disable
    networks:
      - backend
    depends_on:
      pg_primary: { condition: service_healthy }

  nginx_exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nc_nginx_exporter
    ports:
      - "9113:9113"
    restart: unless-stopped
    command:
      - '-nginx.scrape-uri=http://192.168.20.2/nginx-status'
    networks:
      - backend
    depends_on:
      - nginx

  cadvisor:
    image: zcube/cadvisor:latest
    container_name: nc_cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /data/docker:/var/lib/docker:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - backend

  nc_archdash:
    image: node:20-alpine
    container_name: nc_archdash
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && node server.js"
    volumes:
      - /root/nextcloud/av/archdash:/app
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - PROMETHEUS_URL=http://nc_prometheus:9090
    networks:
      - backend
    depends_on:
      - prometheus

  nc_redis_proxy:
    image: haproxy:2.8-alpine
    container_name: nc_redis_proxy
    restart: unless-stopped
    volumes:
      - /root/nextcloud/conf/haproxy/redis.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - backend

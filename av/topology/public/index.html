<!DOCTYPE html>
<html>
<head>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tahoma,Arial,sans-serif;background:#0f172a;color:#e2e8f0;direction:rtl}
.header{background:#1e293b;padding:10px 16px;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:14px;color:#38bdf8}
.controls{display:flex;align-items:center;gap:8px}
#status-txt{font-size:13px}
.btn{padding:5px 14px;background:#1d4ed8;color:white;border:none;border-radius:6px;cursor:pointer;font-size:12px}
.btn:hover{background:#1e40af}
.btn-sec{background:#334155}.btn-sec:hover{background:#475569}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 14px}
.scard{background:#1e293b;border-radius:8px;padding:10px;border:1px solid #334155;text-align:center}
.scard .num{font-size:22px;font-weight:bold}
.scard .lbl{font-size:10px;color:#64748b;margin-top:2px}
.green{color:#4ade80}.red{color:#f87171}.blue{color:#38bdf8}.yellow{color:#fbbf24}
.topo{padding:10px;overflow:hidden;height:calc(100vh - 160px)}
.last-update{font-size:11px;color:#475569;padding:0 16px 10px;text-align:left}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes flow{to{stroke-dashoffset:-16}}
.dot-ok{fill:#4ade80;animation:pulse 1.4s ease-in-out infinite}
.dot-err{fill:#f87171}
.lnk{fill:none}
</style>
</head>
<body>
<div class="header">
  <h1>Nextcloud Enterprise — نقشه زنده سرویس‌ها</h1>
  <div class="controls">
    <span id="status-txt" style="color:#4ade80">در حال بارگذاری...</span>
    <button class="btn btn-sec" onclick="fetchTopology()">بروزرسانی</button>
    <button class="btn" onclick="toggleAuto()" id="auto-btn">auto: ON</button>
  </div>
</div>
<div class="summary">
  <div class="scard"><div class="num yellow" id="s-pct">-</div><div class="lbl">درصد</div></div>
  <div class="scard"><div class="num blue"   id="s-tot">-</div><div class="lbl">کل</div></div>
  <div class="scard"><div class="num red"    id="s-off">-</div><div class="lbl">آفلاین</div></div>
  <div class="scard"><div class="num green"  id="s-on">-</div><div class="lbl">آنلاین</div></div>
</div>
<div class="topo" id="topo-wrap">
  <p style="color:#475569;text-align:center;padding:40px">در حال بارگذاری...</p>
</div>
<div class="last-update" id="last-update">آخرین بروزرسانی: -</div>

<script>
var autoRefresh = true;
var timer = null;

function dot(ok){ return ok ? 'dot-ok' : 'dot-err'; }
function lnkColor(ok){ return ok ? '#4ade80' : '#f87171'; }

function buildSVG(nodes){
  // وضعیت هر container
  function ok(name){ return nodes[name] && nodes[name].ok; }
  function allOk(names){ return names.every(function(n){ return ok(n); }); }

  var appOk   = allOk(['nc_app1','nc_app2','nc_app3']);
  var pgbOk   = ok('nc_pgbouncer');
  var pgpOk   = ok('nc_pg_primary');
  var pgr1Ok  = ok('nc_pg_replica1');
  var pgr2Ok  = ok('nc_pg_replica2');
  var rmOk    = ok('nc_redis_master');
  var rr1Ok   = ok('nc_redis_replica1');
  var rr2Ok   = ok('nc_redis_replica2');
  var s1Ok    = ok('nc_sentinel1');
  var s2Ok    = ok('nc_sentinel2');
  var s3Ok    = ok('nc_sentinel3');
  var avSOk   = ok('av_scanner');
  var clamOk  = ok('clamav');
  var avDOk   = ok('av_dashboard');
  var avCOk   = ok('av_log_collector');
  var nginxOk = ok('nc_nginx');

  var monNames = ['nc_prometheus','nc_grafana','nc_cadvisor','nc_nginx_exporter','nc_pg_exporter','nc_redis_exporter','av_topology','nc_cron'];
  var monOk = monNames.map(function(n){ return ok(n); });

  var avCount = [avSOk,clamOk,avDOk,avCOk].filter(Boolean).length;
  var monCount = monOk.filter(Boolean).length;
  var sentinelCount = [s1Ok,s2Ok,s3Ok].filter(Boolean).length;

  var s = '<svg width="100%" height="100%" viewBox="0 0 1100 900" preserveAspectRatio="xMidYMid meet" style="max-height:calc(100vh - 160px)" role="img"><title>Nextcloud Topology</title>';
  s += '<defs>';
  s += '<marker id="aok" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round"/></marker>';
  s += '<marker id="aorg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/></marker>';
  s += '<marker id="ared" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#f87171" stroke-width="1.5" stroke-linecap="round"/></marker>';
  s += '<marker id="aerr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#f87171" stroke-width="1.5" stroke-linecap="round"/></marker>';
  s += '</defs>';

  function node(x,y,w,h,fill,stroke,text,textColor,isOk){
    var s='';
    s+='<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" rx="7" fill="'+fill+'" stroke="'+(isOk?stroke:'#f87171')+'" stroke-width="'+(isOk?'0.5':'1.5')+'"/>';
    s+='<text x="'+(x+w/2)+'" y="'+(y+h/2)+'" text-anchor="middle" dominant-baseline="central" fill="'+textColor+'" font-size="12" font-weight="500">'+text+'</text>';
    s+='<circle cx="'+(x+w-7)+'" cy="'+(y+8)+'" r="4" class="'+(isOk?'dot-ok':'dot-err')+'"/>';
    return s;
  }
  function group(x,y,w,h,stroke,label,badge){
    return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" rx="10" fill="none" stroke="'+stroke+'" stroke-width="0.7" stroke-dasharray="5 3"/>'
          +'<text x="'+(x+10)+'" y="'+(y+14)+'" fill="'+stroke+'" font-size="11">'+label+'</text>'
          +'<text x="'+(x+w-8)+'" y="'+(y+14)+'" text-anchor="end" fill="'+(badge==='ok'?'#4ade80':'#f87171')+'" font-size="11">'+badge+'</text>';
  }
  function line(x1,y1,x2,y2,color,dash){
    var da = "class=\"lnk\"" + (dash ? " stroke-dasharray=\""+dash+"\"" : "");;
    return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+color+'" stroke-width="1.4" '+da+' fill="none" marker-end="url(#a'+(color==='#4ade80'?'ok':color==='#f97316'?'org':'red')+')"/>';
  }
  function path(d,color,dash,opacity){
    var op = opacity ? ' opacity="'+opacity+'"' : '';
    var da = "class=\"lnk\" style=\"animation:flow .9s linear infinite;stroke-dasharray:6 4\"";;
    var anim = ' style="animation:flow .9s linear infinite"';
    return '<path d="'+d+'" stroke="'+color+'" stroke-width="1.3" '+da+anim+' fill="none"'+op+' marker-end="url(#a'+(color==='#4ade80'?'ok':color==='#f97316'?'org':'red')+')"/>';
  }

  // ROW 0 — کاربران
  s+='<rect x="375" y="16" width="250" height="36" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.6"/>';
  s+='<text x="500" y="39" text-anchor="middle" dominant-baseline="central" fill="#93c5fd" font-size="13" font-weight="500">کاربران — HTTPS :443</text>';
  s+='<circle cx="612" cy="34" r="4" class="dot-ok"/>';
  s+=path('M500 52 L500 88','#4ade80');

  // ROW 1 — nginx
  s+=group(350,88,300,70,'#1d4ed8','Load Balancer','1/1');
  s+=node(375,108,250,34,'#1e3a5f','#3b82f6','nginx','#93c5fd',nginxOk);
  s+=path('M500 158 L500 175 L200 175 L200 208','#4ade80');
  s+=path('M500 158 L500 208','#4ade80');
  s+=path('M500 175 L800 175 L800 208','#4ade80');

  // ROW 2 — App Nodes
  s+=group(60,198,1000,70,'#16a34a','App Nodes',appOk?'3/3':'مشکل');
  s+=node(90,218,220,34,'#14532d','#22c55e','app1','#86efac',ok('nc_app1'));
  s+=node(390,218,220,34,'#14532d','#22c55e','app2','#86efac',ok('nc_app2'));
  s+=node(690,218,220,34,'#14532d','#22c55e','app3','#86efac',ok('nc_app3'));

  // app → pgbouncer
  s+=path('M200 252 L200 268 L200 308','#4ade80');
  s+='<path d="M500 252 L500 268 L200 268" stroke="#4ade80" stroke-width="1.4" class="lnk" style="animation:flow .9s linear infinite;stroke-dasharray:6 4"/>';
  s+='<path d="M800 252 L800 268 L200 268" stroke="#4ade80" stroke-width="1.4" class="lnk" style="animation:flow .9s linear infinite;stroke-dasharray:6 4"/>';
  // app → redis
  s+=path('M200 260 L600 260 L600 308','#f97316','5 3');
  s+='<path d="M500 252 L500 260" stroke="#f97316" stroke-width="1.3" class="lnk" style="animation:flow .9s linear infinite;stroke-dasharray:6 4"/>';
  s+='<path d="M800 252 L800 260 L600 260" stroke="#f97316" stroke-width="1.3" class="lnk" style="animation:flow .9s linear infinite;stroke-dasharray:6 4"/>';
  // app → av
  s+=path('M800 252 L800 264 L920 264 L920 308','#f87171','4 4');

  // ROW 3 — PgBouncer | Redis Master | AV Engine
  s+=group(70,298,260,70,'#6366f1','Connection Pool','');
  s+=node(90,318,220,34,'#312e81','#818cf8','pgbouncer','#c4b5fd',pgbOk);
  s+=group(460,298,280,70,'#ea580c','Cache — Master','');
  s+=node(480,318,240,34,'#451a03','#f97316','redis master','#fdba74',rmOk);
  s+=group(800,298,280,70,'#dc2626','AntiVirus Engine',avCount+'/4');
  s+=node(815,318,115,34,'#450a0a','#f87171','av scanner','#fca5a5',avSOk);
  s+=node(945,318,115,34,'#450a0a','#f87171','clamav','#fca5a5',clamOk);

  // pgbouncer → pg primary
  s+=path('M200 368 L200 428','#4ade80');
  // redis → replicas
  s+=path('M600 368 L600 395 L480 395 L480 428','#f97316','5 3');
  s+=path('M600 395 L720 395 L720 428','#f97316','5 3');
  // av → dashboard و collector
  s+=path('M872 368 L872 428','#f87171','4 4');
  s+=path('M1002 368 L1002 428','#f87171','4 4');

  // ROW 4 — PG Primary | Redis Replicas | AV Dashboard+Collector
  s+=group(70,428,260,70,'#6366f1','Primary DB','');
  s+=node(90,448,220,34,'#312e81','#818cf8','pg primary','#c4b5fd',pgpOk);
  s+=group(380,428,200,70,'#ea580c','Cache Replica 1','');
  s+=node(393,448,174,34,'#451a03','#f97316','redis replica1','#fdba74',rr1Ok);
  s+=group(600,428,200,70,'#ea580c','Cache Replica 2','');
  s+=node(613,448,174,34,'#451a03','#f97316','redis replica2','#fdba74',rr2Ok);
  s+=group(810,428,140,70,'#dc2626','','');
  s+=node(823,448,114,34,'#450a0a','#f87171','av dashboard','#fca5a5',avDOk);
  s+=group(960,428,120,70,'#dc2626','','');
  s+=node(967,448,106,34,'#450a0a','#f87171','av collector','#fca5a5',avCOk);

  // pg primary → replicas
  s+=path('M200 498 L200 528 L150 528 L150 558','#4ade80');
  s+=path('M200 528 L340 528 L340 558','#4ade80');
  // redis replicas → sentinels
  s+=path('M480 498 L480 528 L501 528 L501 558','#f97316','4 4');
  s+=path('M480 528 L605 528 L605 558','#f97316','4 4');
  s+=path('M720 498 L720 528 L709 528 L709 558','#f97316','4 4');

  // ROW 5 — PG Replicas | Sentinels
  s+=group(60,558,180,70,'#6366f1','DB Replica 1','');
  s+=node(73,583,154,34,'#312e81','#818cf8','pg replica1','#c4b5fd',pgr1Ok);
  s+=group(250,558,180,70,'#6366f1','DB Replica 2','');
  s+=node(263,583,154,34,'#312e81','#818cf8','pg replica2','#c4b5fd',pgr2Ok);
  s+=group(450,558,380,70,'#ea580c','Sentinel HA',sentinelCount+'/3');
  s+=node(463,583,96,34,'#451a03','#f97316','sentinel1','#fdba74',s1Ok);
  s+=node(567,583,96,34,'#451a03','#f97316','sentinel2','#fdba74',s2Ok);
  s+=node(671,583,96,34,'#451a03','#f97316','sentinel3','#fdba74',s3Ok);

  // ROW 6 — Monitoring
  var monLabels = ['prometheus','grafana','cadvisor','nginx exporter','pg exporter','redis exporter','av topology','cron'];
  var monKeys   = ['nc_prometheus','nc_grafana','nc_cadvisor','nc_nginx_exporter','nc_pg_exporter','nc_redis_exporter','av_topology','nc_cron'];
  var monWidths = [108,90,90,116,104,116,104,80];
  s+=group(60,680,1020,70,'#475569','Monitoring & Sidecar',monCount+'/8');
  var mx = 73;
  for(var i=0;i<monLabels.length;i++){
    s+=node(mx,700,monWidths[i],34,'#1e293b','#475569',monLabels[i],'#94a3b8',ok(monKeys[i]));
    mx += monWidths[i]+8;
  }

  // legend
  s+='<g transform="translate(70,868)">';
  s+='<circle cx="8" cy="0" r="4" class="dot-ok"/><text x="17" y="4" fill="#475569" font-size="10">آنلاین</text>';
  s+='<circle cx="65" cy="0" r="4" class="dot-err"/><text x="74" y="4" fill="#475569" font-size="10">آفلاین</text>';
  s+='<line x1="125" y1="0" x2="148" y2="0" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="5 3"/><text x="153" y="4" fill="#475569" font-size="10">ارتباط DB</text>';
  s+='<line x1="220" y1="0" x2="243" y2="0" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5 3"/><text x="248" y="4" fill="#475569" font-size="10">Cache</text>';
  s+='<line x1="295" y1="0" x2="318" y2="0" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4 4"/><text x="323" y="4" fill="#475569" font-size="10">AV</text>';
  s+='</g>';
  s+='</svg>';
  return s;
}

function render(data){
  var on=data.summary.online, off=data.summary.offline, tot=data.summary.total;
  document.getElementById('s-on').textContent=on;
  document.getElementById('s-off').textContent=off;
  document.getElementById('s-tot').textContent=tot;
  document.getElementById('s-pct').textContent=Math.round(on/tot*100)+'%';
  var st=document.getElementById('status-txt');
  st.style.color=off>0?'#f87171':'#4ade80';
  st.textContent=off>0?off+' سرویس آفلاین':'همه سرویس‌ها آنلاین';
  document.getElementById('topo-wrap').innerHTML=buildSVG(data.nodes);
  document.getElementById('last-update').textContent='آخرین بروزرسانی: '+new Date().toLocaleString('fa-IR');
}

function fetchTopology(){
  fetch('/api/topology').then(function(r){return r.json();}).then(render).catch(function(e){console.error(e);});
}
function toggleAuto(){
  autoRefresh=!autoRefresh;
  document.getElementById('auto-btn').textContent='auto: '+(autoRefresh?'ON':'OFF');
  if(autoRefresh){timer=setInterval(fetchTopology,10000);}
  else{clearInterval(timer);}
}
fetchTopology();
timer=setInterval(fetchTopology,10000);
</script>
</body>
</html>

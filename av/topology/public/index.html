<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nextcloud Topology</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tahoma,Arial,sans-serif;background:#0f172a;color:#e2e8f0;direction:rtl;min-height:100vh}
.header{background:#1e293b;padding:12px 20px;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header h1{font-size:16px;color:#38bdf8}
.controls{display:flex;align-items:center;gap:8px}
#status-txt{font-size:13px}
.btn{padding:5px 14px;background:#1d4ed8;color:white;border:none;border-radius:6px;cursor:pointer;font-size:12px}
.btn:hover{background:#1e40af}
.btn-sec{background:#334155}.btn-sec:hover{background:#475569}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px}
.scard{background:#1e293b;border-radius:8px;padding:12px;border:1px solid #334155;text-align:center}
.scard .num{font-size:24px;font-weight:bold}
.scard .lbl{font-size:10px;color:#64748b;margin-top:2px}
.green{color:#4ade80}.red{color:#f87171}.blue{color:#38bdf8}.yellow{color:#fbbf24}
.topo-wrap{padding:12px 16px 20px;overflow:auto}
.last-update{font-size:11px;color:#475569;padding:0 16px 12px;text-align:left}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes flow{to{stroke-dashoffset:-16}}
.dot-ok{fill:#4ade80;animation:pulse 1.4s ease-in-out infinite}
.dot-err{fill:#f87171}
.lnk-ok{stroke:#4ade80;stroke-dasharray:6 4;animation:flow .9s linear infinite;fill:none}
.lnk-err{stroke:#f87171;fill:none}
</style>
</head>
<body>
<div class="header">
  <h1>Nextcloud Enterprise — نقشه زنده سرویس‌ها</h1>
  <div class="controls">
    <span id="status-txt" style="color:#4ade80">در حال بارگذاری...</span>
    <button class="btn btn-sec" onclick="fetchTopology()">بروزرسانی</button>
    <button class="btn" onclick="toggleAuto()" id="auto-btn">auto: ON</button>
  </div>
</div>
<div class="summary">
  <div class="scard"><div class="num green" id="s-on">-</div><div class="lbl">آنلاین</div></div>
  <div class="scard"><div class="num red" id="s-off">-</div><div class="lbl">آفلاین</div></div>
  <div class="scard"><div class="num blue" id="s-tot">-</div><div class="lbl">کل</div></div>
  <div class="scard"><div class="num yellow" id="s-pct">-</div><div class="lbl">درصد</div></div>
</div>
<div class="topo-wrap" id="topo-wrap">
  <p style="color:#475569;text-align:center;padding:40px">در حال بارگذاری...</p>
</div>
<div class="last-update" id="last-update">آخرین بروزرسانی: -</div>

<script>
var autoRefresh = true;
var timer = null;

// گروه‌بندی و رنگ‌بندی
var GROUPS = {
  loadbalancer:{ label:'Load Balancer', fill:'#1e3a5f', stroke:'#3b82f6', text:'#93c5fd', sub:'#60a5fa', border:'#1d4ed8' },
  app:         { label:'App Nodes',     fill:'#14532d', stroke:'#22c55e', text:'#86efac', sub:'#4ade80', border:'#16a34a' },
  database:    { label:'Database',      fill:'#312e81', stroke:'#818cf8', text:'#c4b5fd', sub:'#a78bfa', border:'#6366f1' },
  cache:       { label:'Cache / Redis', fill:'#451a03', stroke:'#f97316', text:'#fdba74', sub:'#fb923c', border:'#ea580c' },
  antivirus:   { label:'AntiVirus',     fill:'#450a0a', stroke:'#f87171', text:'#fca5a5', sub:'#f87171', border:'#dc2626' },
  monitoring:  { label:'Monitoring',    fill:'#1e293b', stroke:'#475569', text:'#94a3b8', sub:'#64748b', border:'#475569' },
  other:       { label:'سایر',          fill:'#1e293b', stroke:'#475569', text:'#94a3b8', sub:'#64748b', border:'#475569' },
};

var GROUP_ORDER = ['loadbalancer','app','database','cache','antivirus','monitoring','other'];

// فقط ارتباطات اصلی بین گروه‌ها
var MAIN_LINKS = [
  { from:'users',        to:'loadbalancer' },
  { from:'loadbalancer', to:'app' },
  { from:'app',          to:'database' },
  { from:'app',          to:'cache' },
  { from:'app',          to:'antivirus' },
];

function buildSVG(nodes) {
  var BW = 148; var BH = 36; var HGAP = 8;
  var GRP_PAD = 12; var GRP_HEAD = 20;
  var TIER_GAP = 55;
  var SVG_MARGIN = 40;

  // گروه‌بندی nodes
  var grouped = {};
  GROUP_ORDER.forEach(function(g){ grouped[g] = []; });
  Object.entries(nodes).forEach(function(e) {
    var g = e[1].group || 'other';
    if (!grouped[g]) grouped[g] = [];
    grouped[g].push({ key: e[0], node: e[1] });
  });

  // حذف گروه‌های خالی
  var activeGroups = GROUP_ORDER.filter(function(g){ return grouped[g] && grouped[g].length > 0; });

  // محاسبه سایز هر گروه
  var grpInfo = {};
  activeGroups.forEach(function(g) {
    var items = grouped[g];
    var cols = Math.min(items.length, 4);
    var rows = Math.ceil(items.length / cols);
    var w = cols * BW + (cols-1) * HGAP + GRP_PAD*2;
    var h = rows * BH + (rows-1) * HGAP + GRP_PAD*2 + GRP_HEAD;
    grpInfo[g] = { cols:cols, rows:rows, w:w, h:h, items:items };
  });

  // Layout: تعریف ردیف‌ها
  var ROWS = [
    ['loadbalancer'],
    ['app'],
    ['database'],
    ['cache','antivirus'],
    ['monitoring','other'],
  ].filter(function(row){ return row.some(function(g){ return grpInfo[g]; }); });

  var maxRowW = 0;
  ROWS.forEach(function(row) {
    var validRow = row.filter(function(g){ return grpInfo[g]; });
    var rowW = validRow.reduce(function(s,g){ return s + grpInfo[g].w; }, 0) + (validRow.length-1)*24;
    maxRowW = Math.max(maxRowW, rowW);
  });
  var SVG_W = Math.max(960, maxRowW + 120);
  var grpPos = {};
  var rowY = 80;

  ROWS.forEach(function(row) {
    var validRow = row.filter(function(g){ return grpInfo[g]; });
    if (!validRow.length) return;
    var totalW = validRow.reduce(function(s,g){ return s + grpInfo[g].w; }, 0) + (validRow.length-1)*24;
    var startX = (SVG_W - totalW) / 2;
    var maxH = 0;
    validRow.forEach(function(g) {
      grpPos[g] = { x: startX, y: rowY };
      startX += grpInfo[g].w + 24;
      maxH = Math.max(maxH, grpInfo[g].h);
    });
    rowY += maxH + TIER_GAP;
  });

  // موقعیت هر node
  var nodePos = {};
  activeGroups.forEach(function(g) {
    if (!grpPos[g]) return;
    var gp = grpPos[g]; var gi = grpInfo[g];
    var col = 0; var row = 0;
    gi.items.forEach(function(item) {
      nodePos[item.key] = {
        x: gp.x + GRP_PAD + col*(BW+HGAP),
        y: gp.y + GRP_HEAD + GRP_PAD + row*(BH+HGAP),
        w: BW, h: BH, ok: item.node.ok, group: g
      };
      col++;
      if (col >= gi.cols) { col=0; row++; }
    });
  });

  var SVG_H = rowY + 40;

  var svg = '<svg width="' + SVG_W + '" height="' + SVG_H + '" viewBox="0 0 ' + SVG_W + ' ' + SVG_H + '">';
  svg += '<defs>';
  svg += '<marker id="aok" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round"/></marker>';
  svg += '<marker id="aerr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#f87171" stroke-width="1.5" stroke-linecap="round"/></marker>';
  svg += '</defs>';

  // کاربران در بالا
  var uw = 260; var ux = SVG_W/2-uw/2; var uy = 14;
  svg += '<rect x="'+ux+'" y="'+uy+'" width="'+uw+'" height="36" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5"/>';
  svg += '<text x="'+(SVG_W/2)+'" y="'+(uy+18)+'" text-anchor="middle" dominant-baseline="central" fill="#93c5fd" font-size="13" font-weight="500">کاربران — HTTPS :443</text>';
  svg += '<circle cx="'+(ux+uw-8)+'" cy="'+(uy+18)+'" r="4" class="dot-ok"/>';

  // خط users → nginx group
  if (grpPos['loadbalancer'] && grpInfo['loadbalancer']) {
    var gp = grpPos['loadbalancer']; var gi = grpInfo['loadbalancer'];
    var lbOk = gi.items.every(function(i){ return i.node.ok; });
    var x1 = SVG_W/2; var y1 = uy+36;
    var x2 = gp.x + gi.w/2; var y2 = gp.y;
    svg += '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(lbOk?'#4ade80':'#f87171')+'" stroke-width="1.5" '+(lbOk?'class="lnk-ok"':'')+' marker-end="url(#a'+(lbOk?'ok':'err')+')"/>';
  }

  // ارتباطات بین گروه‌ها
  MAIN_LINKS.forEach(function(lnk) {
    if (lnk.from === 'users') return;
    var fp = grpPos[lnk.from]; var fi = grpInfo[lnk.from];
    var tp = grpPos[lnk.to];   var ti = grpInfo[lnk.to];
    if (!fp||!fi||!tp||!ti) return;
    var fOk = fi.items.every(function(i){ return i.node.ok; });
    var tOk = ti.items.every(function(i){ return i.node.ok; });
    var ok = fOk && tOk;
    var x1 = fp.x+fi.w/2; var y1 = fp.y+fi.h;
    var x2 = tp.x+ti.w/2; var y2 = tp.y;
    var cy = (y1+y2)/2;
    svg += '<path d="M'+x1+' '+y1+' C'+x1+' '+cy+' '+x2+' '+cy+' '+x2+' '+y2+'" stroke="'+(ok?'#4ade80':'#f87171')+'" stroke-width="1.5" '+(ok?'class="lnk-ok"':'')+' fill="none" marker-end="url(#a'+(ok?'ok':'err')+')"/>';
  });

  // group boxes
  activeGroups.forEach(function(g) {
    if (!grpPos[g]||!grpInfo[g]) return;
    var gp = grpPos[g]; var gi = grpInfo[g];
    var gc = GROUPS[g] || GROUPS.other;
    var allOk = gi.items.every(function(i){ return i.node.ok; });
    var okCount = gi.items.filter(function(i){ return i.node.ok; }).length;
    svg += '<rect x="'+gp.x+'" y="'+gp.y+'" width="'+gi.w+'" height="'+gi.h+'" rx="10" fill="none" stroke="'+(allOk?gc.border:'#f87171')+'" stroke-width="0.8" stroke-dasharray="5 3"/>';
    svg += '<text x="'+(gp.x+8)+'" y="'+(gp.y+14)+'" fill="'+(allOk?gc.sub:'#f87171')+'" font-size="11" font-weight="500">'+gc.label+'</text>';
    svg += '<text x="'+(gp.x+gi.w-8)+'" y="'+(gp.y+14)+'" text-anchor="end" fill="'+(allOk?'#4ade80':'#f87171')+'" font-size="11">'+okCount+'/'+gi.items.length+'</text>';
  });

  // nodes
  Object.entries(nodePos).forEach(function(e) {
    var key = e[0]; var p = e[1];
    var gc = GROUPS[p.group] || GROUPS.other;
    var ok = p.ok;
    svg += '<rect x="'+p.x+'" y="'+p.y+'" width="'+p.w+'" height="'+p.h+'" rx="7" fill="'+gc.fill+'" stroke="'+(ok?gc.stroke:'#f87171')+'" stroke-width="'+(ok?'0.5':'1.5')+'" opacity="'+(ok?'1':'0.5')+'"/>';
    var label = key.replace(/^nc_/,'').replace(/_/g,' ');
    svg += '<text x="'+(p.x+p.w/2)+'" y="'+(p.y+p.h/2)+'" text-anchor="middle" dominant-baseline="central" fill="'+gc.text+'" font-size="12" font-weight="500">'+label+'</text>';
    svg += '<circle cx="'+(p.x+p.w-7)+'" cy="'+(p.y+8)+'" r="4" class="'+(ok?'dot-ok':'dot-err')+'"/>';
  });

  // legend
  svg += '<g transform="translate(20,'+(SVG_H-18)+')">';
  svg += '<circle cx="8" cy="0" r="4" class="dot-ok"/><text x="17" y="4" fill="#475569" font-size="10">آنلاین</text>';
  svg += '<circle cx="65" cy="0" r="4" class="dot-err"/><text x="74" y="4" fill="#475569" font-size="10">آفلاین</text>';
  svg += '<line x1="125" y1="0" x2="148" y2="0" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="5 3"/><text x="153" y="4" fill="#475569" font-size="10">ارتباط فعال</text>';
  svg += '<line x1="230" y1="0" x2="253" y2="0" stroke="#f87171" stroke-width="1.5"/><text x="258" y="4" fill="#475569" font-size="10">ارتباط قطع</text>';
  svg += '</g>';

  svg += '</svg>';
  return svg;
}

function render(data) {
  var on = data.summary.online; var off = data.summary.offline; var tot = data.summary.total;
  document.getElementById('s-on').textContent = on;
  document.getElementById('s-off').textContent = off;
  document.getElementById('s-tot').textContent = tot;
  document.getElementById('s-pct').textContent = Math.round(on/tot*100)+'%';
  var st = document.getElementById('status-txt');
  st.style.color = off > 0 ? '#f87171' : '#4ade80';
  st.textContent = off > 0 ? off+' سرویس آفلاین' : 'همه سرویس‌ها آنلاین';
  document.getElementById('topo-wrap').innerHTML = buildSVG(data.nodes);
  document.getElementById('last-update').textContent = 'آخرین بروزرسانی: '+new Date().toLocaleString('fa-IR');
}

function fetchTopology() {
  fetch('/api/topology').then(function(r){return r.json();}).then(render).catch(function(e){console.error(e);});
}

function toggleAuto() {
  autoRefresh = !autoRefresh;
  document.getElementById('auto-btn').textContent = 'auto: '+(autoRefresh?'ON':'OFF');
  if (autoRefresh){ timer = setInterval(fetchTopology,10000); }
  else { clearInterval(timer); }
}

fetchTopology();
timer = setInterval(fetchTopology, 10000);
</script>
</body>
</html>

global:
  scrape_interval: 30s

scrape_configs:
  - job_name: 'nginx'
    static_configs:
      - targets: ['nc_nginx_exporter:9113']
  - job_name: 'redis'
    static_configs:
      - targets: ['nc_redis_exporter:9121']
  - job_name: 'postgres'
    static_configs:
      - targets: ['nc_pg_exporter:9187']
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['nc_cadvisor:8080']
  - job_name: 'docker'
    static_configs:
      - targets: ['172.17.0.1:9323']

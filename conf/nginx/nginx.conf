user nginx;
worker_processes auto;
worker_rlimit_nofile 65536;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 16G;
    client_body_buffer_size 512k;
    client_body_timeout 300s;
    client_header_timeout 60s;
    send_timeout 300s;
    fastcgi_send_timeout 300s;
    fastcgi_read_timeout 300s;
    fastcgi_buffer_size 16k;
    fastcgi_buffers 8 16k;
    gzip on;
    gzip_vary on;
    gzip_comp_level 4;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml font/woff2;
    limit_req_zone $binary_remote_addr zone=nc_login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=nc_api:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=nc_conn:10m;
    upstream nextcloud_php {
        least_conn;
        server app1:9000 weight=1 max_fails=3 fail_timeout=30s;
        server app2:9000 weight=1 max_fails=3 fail_timeout=30s;
        server app3:9000 weight=1 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    include /etc/nginx/conf.d/*.conf;
}

[databases]
nextcloud = host=pg_primary port=5432 dbname=nextcloud

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
pool_mode = session
max_client_conn = 1000
default_pool_size = 50
reserve_pool_size = 10
server_idle_timeout = 600
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt
log_connections = 0
log_disconnections = 0

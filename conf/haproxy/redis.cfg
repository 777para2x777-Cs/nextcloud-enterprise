global
  maxconn 256
  log stdout format raw local0

resolvers docker
  nameserver dns 127.0.0.11:53
  resolve_retries 3
  timeout resolve 1s
  timeout retry 1s
  hold valid 10s

defaults
  mode tcp
  timeout connect 5s
  timeout client 30s
  timeout server 30s
  log global

frontend redis_front
  bind *:6380
  default_backend redis_back

backend redis_back
  option tcp-check
  tcp-check connect
  tcp-check send AUTH\ PMO@123456\r\n
  tcp-check expect string +OK
  tcp-check send PING\r\n
  tcp-check expect string +PONG
  tcp-check send info\ replication\r\n
  tcp-check expect string role:master
  server redis_master   nc_redis_master:6379   check inter 2s resolvers docker init-addr none
  server redis_replica1 nc_redis_replica1:6379 check inter 2s resolvers docker init-addr none
  server redis_replica2 nc_redis_replica2:6379 check inter 2s resolvers docker init-addr none
